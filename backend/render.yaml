services:
  - type: web
    name: hackradar-backend
    env: python
    region: oregon
    plan: free
    branch: master
    buildCommand: pip install -r backend\requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SCRAPEOPS_API_KEY
        sync: false
